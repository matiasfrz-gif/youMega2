name: Serie de Terror Rene Enriquez IA

on:
  workflow_dispatch: # Permite arrancar la serie manualmente apretando el boton de play en la web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python en la nube
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias de MoviePy y Gemini
        run: |
          python -m pip install --upgrade pip
          pip install google-genai edge-tts moviepy requests gTTS google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Instalar dependencias del sistema (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Ejecutar el capitulo de la serie de Rene
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: python serie_rene.py

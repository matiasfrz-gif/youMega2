name: Fabrica de Peliculas de Zombies IA

on:
  workflow_dispatch: # Permite arrancar el bot manualmente apretando un boton en la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python en la nube
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias de MoviePy y Gemini
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependencias del sistema (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Ejecutar creador de peliculas de zombis
        env:
          # Aca GitHub le presta tus secretos actuales al codigo de Python
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
        run: python generador_zombies.py


name: Figuritas Mundial 2026

on:
  workflow_dispatch: # Botón para correrlo manualmente
  schedule:
  - cron: '0 3,9,15,21 * * *'  # 3, 9, 15 y 21 UTC — desfasado del otro

jobs:
  crear-figurita:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias del sistema (FFmpeg)
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Instalar librerías de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar el generador de figuritas
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      run: python figuritas_mundial.py

    - name: Guardar el progreso de vuelta al repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add progreso_figuritas.json
        git diff --staged --quiet || git commit -m "Actualizar progreso de figuritas [skip ci]"
        git push
